<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collections List</title>
    <link rel="stylesheet" href="./ex03.css" />
  </head>
  <body>
    <section class="wrapper">
      <div class="container">
        <h2>Popular Collections</h2>

        <div class="tags">
          <span>Profile</span>
          <span>New York</span>
          <span>Relaxing</span>
          <span>Person</span>
          <span>Fashion</span>
        </div>

        <div class="grid">
          <div class="card">
            <img src="../image/people-1.jpg" class="main-img" />
            <div class="thumbs">
              <img src="../image/people-1.1" />
              <img src="../image/people1.2" />
              <img src="../image/people1.3" />
            </div>
            <div class="info">
              <h3>People</h3>
              <div class="info-left">
                <img src="../image/icon_image.png" alt="" />
                <span>144</span>
              </div>
            </div>
          </div>

          <div class="card">
            <img src="../image/nature-1.png" class="main-img" />
            <div class="thumbs">
              <img src="../image/nature-1.1" />
              <img src="../image/nature-1.2" />
              <img src="../image/nature-1.3" />
            </div>
            <div class="info">
              <h3>Nature</h3>
              <div class="info-left">
                <img src="../image/icon_image.png" alt="" />
                <span>7</span>
              </div>
            </div>
          </div>

          <div class="card">
            <img src="../image/history-1.png" class="main-img" />
            <div class="thumbs">
              <img src="../image/history-1.1" />
              <img src="../image/history-1.2" />
              <img src="../image/history-1.3" />
            </div>
            <div class="info">
              <h3>History</h3>
              <div class="info-left">
                <img src="../image/icon_image.png" alt="" />
                <span>431</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
