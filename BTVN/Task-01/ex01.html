<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Info</title>
    <link rel="stylesheet" href="./ex01.css" />
    <!--  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <section class="product-card">
        <div class="product-image">
          <img src="../image/image 1.svg" alt="Razer Kraken Kitty Headset" />
        </div>

        <div class="product-info">
          <span class="badge">Free shipping</span>

          <h1 class="title">Razer Kraken Kitty Edt Gaming Headset Quartz</h1>

          <p class="old-price">1 599 000</p>
          <p class="price">799,000</p>

          <p class="note">
            The offer is valid until April 3 or as long as stock lasts!
          </p>

          <button class="btn primary">Add to cart</button>

          <p class="stock">
            <span class="dot"></span>
            50+ pcs. in stock.
          </p>

          <div class="actions">
            <button class="btn secondary">
              <img src="../image/Frame.svg" alt="" />Add to cart
            </button>
            <button class="btn secondary">
              <img src="../image/Frame 2.svg" alt="" />Add to wishlist
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
