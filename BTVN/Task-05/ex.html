<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOL Champions</title>
    <link rel="stylesheet" href="./styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <img src="./img/Banner.jpg" class="banner" />

      <div class="menu">
        <img src="./img/logo.png" alt="" />
        <nav>
          <a>Game</a>
          <a>Champions</a>
          <a>News</a>
          <a>Patch Notes</a>
          <a>Discover</a>
          <a>Esports</a>
          <a>Universe</a>
        </nav>
      </div>

      <div class="grid">
        <div class="card">
          <img src="./img/AHRI.jpg" />
          <div class="name">AHRI</div>
        </div>

        <div class="card">
          <img src="./img/AKALI.png" />
          <div class="name">AKALI</div>
        </div>

        <div class="card">
          <img src="./img/AZIR.png" />
          <div class="name">AZIR</div>
        </div>

        <div class="card">
          <img src="./img/CAITLYN.png" />
          <div class="name">CAITLYN</div>
        </div>

        <div class="card">
          <img src="./img/DARIUS.png" />
          <div class="name">DARIUS</div>
        </div>

        <div class="card">
          <img src="./img/FIZZ.png" />
          <div class="name">FIZZ</div>
        </div>

        <div class="card">
          <img src="./img/IRELIA.png" />
          <div class="name">IRELIA</div>
        </div>

        <div class="card">
          <img src="./img/JINX.png" />
          <div class="name">JINX</div>
        </div>

        <div class="card">
          <img src="./img/RENGAR.png" />
          <div class="name">RENGAR</div>
        </div>

        <div class="card">
          <img src="./img/SERAPHINE.png" />
          <div class="name">SERAPHINE</div>
        </div>

        <div class="card">
          <img src="./img/YASUO.png" />
          <div class="name">YASUO</div>
        </div>

        <div class="card">
          <img src="./img/WUKONG.png" />
          <div class="name">WUKONG</div>
        </div>
      </div>

      <img src="./img/banner-2.png" class="banner" />

      <footer class="footer">
        <span>© 2021 All Rights Reserved</span>

        <div class="form">
          <input type="text" placeholder="Email Address" />
          <button>Play For Free</button>
        </div>
      </footer>
    </div>
  </body>
</html>
