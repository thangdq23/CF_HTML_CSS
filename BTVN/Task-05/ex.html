<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOL Champions</title>
    <link rel="stylesheet" href="./styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <img src="./img/Banner.jpg" class="banner" />

      <div class="menu">
        <img src="./img/logo.png" alt="" />
        <ul>
          <li>Game</li>
          <li>Champions</li>
          <li>News</li>
          <li>Patch Notes</li>
          <li>Discover</li>
          <li>Esports</li>
          <li>Universe</li>
        </ul>
      </div>

      <div class="grid">
        <div class="hero">
          <img src="./img/AHRI.jpg" />
          <span class="name">AHRI</span>
        </div>

        <div class="hero">
          <img src="./img/AKALI.png" />
          <span class="name">AKALI</span>
        </div>

        <div class="hero">
          <img src="./img/AZIR.png" />
          <span class="name">AZIR</span>
        </div>

        <div class="hero">
          <img src="./img/CAITLYN.png" />
          <span class="name">CAITLYN</span>
        </div>

        <div class="hero">
          <img src="./img/DARIUS.png" />
          <span class="name">DARIUS</span>
        </div>

        <div class="hero">
          <img src="./img/FIZZ.png" />
          <span class="name">FIZZ</span>
        </div>

        <div class="hero">
          <img src="./img/IRELIA.png" />
          <span class="name">IRELIA</span>
        </div>

        <div class="hero">
          <img src="./img/JINX.png" />
          <span class="name">JINX</span>
        </div>

        <div class="hero">
          <img src="./img/RENGAR.png" />
          <span class="name">RENGAR</span>
        </div>

        <div class="hero">
          <img src="./img/SERAPHINE.png" />
          <span class="name">SERAPHINE</span>
        </div>

        <div class="hero">
          <img src="./img/YASUO.png" />
          <span class="name">YASUO</span>
        </div>

        <div class="hero">
          <img src="./img/WUKONG.png" />
          <span class="name">WUKONG</span>
        </div>
      </div>

      <a href="https://www.youtube.com/watch?v=O4PDzBnBMU4" target="_blank">
        <img src="./img/banner-2.png" class="banner" />
      </a>

      <footer class="footer">
        <span>© 2021 All Rights Reserved</span>

        <div class="form">
          <input type="text" placeholder="Email Address" />
          <button>Play For Free</button>
        </div>
      </footer>
    </div>
  </body>
</html>
