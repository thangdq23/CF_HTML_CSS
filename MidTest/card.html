<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="search">
          <input type="text" placeholder="Search for a part-time job" />
          <button>
            <img src="./img/map.png" alt="" />
            Use Map
          </button>
        </div>
        <div class="grid">
          <div class="item pink active">
            <img src="./img/Frame-1.png" alt="Furniture" />
            Furniture
          </div>
          <div class="item purple active">
            <img src="./img/Frame-2.png" alt="Property" />
            Property
          </div>
          <div class="item blue active">
            <img src="./img/Frame-3.png" alt="Job" />
            Job
          </div>
          <div class="item green active">
            <img src="./img/Frame-4.png" alt="" />
            Travel
          </div>

          <div class="item lightgreen active">
            <img src="./img/Frame-5.png" alt="" />
            Boat
          </div>
          <div class="item white active">
            <img src="./img/Frame-6.png" alt="" />
            MC
          </div>
          <div class="item yellow active">
            <img src="./img/Frame-7.png" alt="" />
            Economy
          </div>
          <div class="item orange active">
            <img src="./img/Frame-8.png" alt="" />
            Holiday
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
